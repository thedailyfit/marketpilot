<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MARKETPILOT AI // TERMINAL</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;700;900&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #e1e1e1;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass {
            background: rgba(18, 18, 18, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .sidebar-link {
            transition: all 0.2s;
            display: block;
        }

        .sidebar-link:hover {
            background: rgba(0, 255, 157, 0.1);
        }

        .sidebar-link.active {
            background: rgba(0, 255, 157, 0.2);
            border-left: 3px solid #00ff9d;
        }

        .btn-hex {
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .btn-hex:active {
            transform: translateY(2px);
            opacity: 0.8;
        }

        .tab-active-paper {
            background: #f59e0b;
            color: black;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .tab-active-live {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .tab-inactive {
            background: #111;
            color: #555;
            border: 1px solid #333;
        }

        .ai-btn {
            background: rgba(0, 255, 157, 0.05);
            border: 1px solid rgba(0, 255, 157, 0.2);
            color: #00ff9d;
        }

        .ai-btn:hover {
            background: rgba(0, 255, 157, 0.1);
            border-color: #00ff9d;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.2);
        }

        .ai-btn-red {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .ai-btn-red:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        input[type=range] {
            -webkit-appearance: none;
            background: #222;
            height: 4px;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #00ff9d;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<body class="h-screen w-screen flex">
    <!-- SIDEBAR -->
    <aside class="w-14 glass flex flex-col items-center py-4 gap-4">
        <a href="/dashboard" class="sidebar-link active p-3 rounded text-xl" title="Dashboard">📊</a>
        <a href="/trades" class="sidebar-link p-3 rounded text-xl" title="Trades">📜</a>
        <a href="/settings" class="sidebar-link p-3 rounded text-xl" title="Settings">⚙️</a>
    </aside>

    <!-- MAIN CONTENT WRAPPER -->
    <div class="flex-1 flex flex-col p-3 gap-3">

        <!-- HEADER -->
        <header class="h-20 flex gap-4">
            <div class="glass w-64 flex flex-col justify-center px-6 rounded">
                <h1 class="text-3xl font-black italic tracking-tighter leading-none">MARKETPILOT<span
                        class="text-[#00ff9d]">AI</span></h1>
                <span class="text-xs text-gray-500 font-bold tracking-[0.2em]">COMMAND V9.4</span>
            </div>
            <div class="flex-1 flex gap-2">
                <button onclick="setMode('PAPER')" id="tab-paper"
                    class="flex-1 rounded flex flex-col justify-center px-6 tab-active-paper transition-all relative overflow-hidden group">
                    <span class="text-xs font-bold uppercase opacity-70">Simulation Mode</span>
                    <span class="text-2xl font-black tracking-tight" id="bal-paper">₹1,00,00,000</span>
                    <div class="flex justify-between w-full mt-1 border-t border-black/10 pt-1">
                        <span class="text-[10px] font-bold opacity-60">P&L</span>
                        <span class="text-[10px] font-bold" id="pnl-paper">₹0.00</span>
                    </div>
                </button>
                <button onclick="setMode('LIVE')" id="tab-live"
                    class="flex-1 rounded flex flex-col justify-center px-6 tab-inactive transition-all relative overflow-hidden group">
                    <span class="text-xs font-bold uppercase opacity-70">Real Execution</span>
                    <span class="text-2xl font-black tracking-tight" id="bal-live">--</span>
                    <div class="flex justify-between w-full mt-1 border-t border-white/10 pt-1">
                        <span class="text-[10px] font-bold opacity-60">P&L</span>
                        <span class="text-[10px] font-bold" id="pnl-live">₹0.00</span>
                    </div>
                </button>
            </div>
            <div class="glass w-48 flex flex-col justify-center px-4 rounded text-right">
                <span class="text-[10px] text-gray-500 uppercase font-bold">Data Latency</span>
                <span class="text-2xl font-bold mono text-[#00ff9d]" id="latency">14ms</span>
            </div>
        </header>

        <!-- CONTENT GRID -->
        <main class="flex-1 grid grid-cols-12 gap-3 min-h-0">
            <!-- LEFT: CONTROLS -->
            <div class="col-span-4 glass flex flex-col p-5 gap-6 rounded-lg overflow-y-auto">
                <div class="flex gap-2 h-12">
                    <button onclick="selIdx('NIFTY')" id="btn-NIFTY"
                        class="idx-btn flex-1 bg-[#222] text-white font-bold text-lg rounded border border-[#444] transition-colors">NIFTY</button>
                    <button onclick="selIdx('BANKNIFTY')" id="btn-BANKNIFTY"
                        class="idx-btn flex-1 bg-black text-gray-600 font-bold text-lg rounded border border-[#222] transition-colors">BANKNIFTY</button>
                </div>

                <!-- ATM CONTRACT -->
                <div class="glass p-4 rounded border-l-4 border-[#00ff9d] relative overflow-hidden group">
                    <div
                        class="absolute right-0 top-0 p-4 opacity-10 font-black text-6xl text-white pointer-events-none">
                        ATM</div>
                    <div>
                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Target Contract</div>
                        <div class="text-xl font-black text-white tracking-tighter mt-1 flex gap-2">
                            <span id="disp-day" class="cursor-pointer hover:text-[#00ff9d]"
                                onclick="adjDate(1)">26</span>
                            <span id="disp-month" class="cursor-pointer hover:text-[#00ff9d]"
                                onclick="cycMonth()">OCT</span>
                            <span id="disp-strike">19500</span>
                            <span id="disp-type" class="text-[#00ff9d]">CE</span>
                        </div>
                    </div>
                    <div class="mt-3 flex flex-wrap gap-2 opacity-100 transition-opacity">
                        <div class="flex gap-1">
                            <button onclick="adjStrike(-50)"
                                class="px-2 py-1 bg-[#222] text-[10px] rounded hover:bg-[#333]">-50</button>
                            <button onclick="adjStrike(50)"
                                class="px-2 py-1 bg-[#222] text-[10px] rounded hover:bg-[#333]">+50</button>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="adjDate(-1)"
                                class="px-2 py-1 bg-[#222] text-[10px] rounded hover:bg-[#333]">D-</button>
                            <button onclick="adjDate(1)"
                                class="px-2 py-1 bg-[#222] text-[10px] rounded hover:bg-[#333]">D+</button>
                        </div>
                        <button onclick="cycMonth()"
                            class="px-2 py-1 bg-[#222] text-[10px] rounded hover:bg-[#333]">MTH</button>
                        <button onclick="togType()"
                            class="px-2 py-1 bg-[#222] text-[10px] rounded hover:bg-[#333] w-8 text-[#00ff9d]"
                            id="btn-type-tog">CE</button>
                    </div>
                </div>

                <!-- POSITION SIZING -->
                <div class="bg-black/40 p-4 rounded border border-white/5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-gray-500">POSITION SIZING</span>
                        <span class="text-[10px] text-[#00ff9d] mono" id="lot-info">1 Lot = 50 Qty</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="updLots(-1)"
                            class="w-10 h-10 bg-[#222] text-white text-xl font-bold rounded hover:bg-[#333]">-</button>
                        <div class="flex-1 text-center">
                            <div id="lot-count" class="text-4xl font-black text-white">1</div>
                        </div>
                        <button onclick="updLots(1)"
                            class="w-10 h-10 bg-[#222] text-white text-xl font-bold rounded hover:bg-[#333]">+</button>
                    </div>
                </div>

                <!-- MANUAL INJECTION -->
                <div class="space-y-2">
                    <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Manual Injection</div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="manualExec('BUY')"
                            class="ai-btn py-3 rounded text-xs font-black tracking-widest flex items-center justify-center gap-2">
                            <span>INJECT BUY</span>
                            <div class="w-1.5 h-1.5 bg-[#00ff9d] rounded-full animate-pulse"></div>
                        </button>
                        <button onclick="manualExec('SELL')"
                            class="ai-btn-red py-3 rounded text-xs font-black tracking-widest flex items-center justify-center gap-2">
                            <span>INJECT SELL</span>
                            <div class="w-1.5 h-1.5 bg-[#ef4444] rounded-full animate-pulse"></div>
                        </button>
                    </div>
                </div>

                <!-- SYSTEM CONTROLS -->
                <div class="mt-auto flex flex-col gap-2">
                    <button onclick="runDeepScan()"
                        class="btn-hex w-full py-2 bg-[#58a6ff] hover:bg-[#4096ff] text-black text-xs font-bold shadow-[0_0_15px_rgba(88,166,255,0.3)]">RUN
                        DEEP SCAN (PHASE 6)</button>
                    <button onclick="start()"
                        class="btn-hex w-full py-4 bg-[#00ff9d] hover:bg-[#00cc7d] text-black shadow-[0_0_20px_rgba(0,255,157,0.3)]">INITIALIZE
                        AGENT</button>
                    <button onclick="stop()"
                        class="btn-hex w-full py-2 bg-transparent border border-[#ff4d4d] text-[#ff4d4d] hover:bg-[#ff4d4d] hover:text-white text-[10px]">SYSTEM
                        HALT</button>
                </div>
            </div>

            <!-- RIGHT: CHARTS & INTELLIGENCE -->
            <div class="col-span-8 flex flex-col gap-3">
                <div class="h-[60%] flex gap-2">
                    <div class="flex-1 glass p-1 flex flex-col relative rounded-lg overflow-hidden">
                        <div class="absolute top-2 left-2 z-10 flex gap-2 items-center">
                            <span
                                class="text-[10px] font-bold text-gray-400 bg-black/50 px-2 rounded border border-white/5">MAIN
                                INDICES</span>
                            <span id="ltp-spot" class="text-sm font-bold text-white mono">--.--</span>
                        </div>
                        <div id="chart-spot" class="w-full h-full bg-[#080808]"></div>
                    </div>
                    <div class="flex-1 glass p-1 flex flex-col relative rounded-lg overflow-hidden">
                        <div class="absolute top-2 left-2 z-10 flex gap-2 items-center">
                            <span
                                class="text-[10px] font-bold text-[#00ff9d] bg-black/50 px-2 rounded border border-[#00ff9d]/20">TARGET
                                OPTION</span>
                            <span id="ltp-opt" class="text-sm font-bold text-white mono">--.--</span>
                        </div>
                        <div id="chart-opt" class="w-full h-full bg-[#080808]"></div>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-2 gap-3 min-h-0">
                    <div class="glass p-4 rounded-lg flex flex-col gap-2 relative overflow-hidden">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold uppercase text-[#58a6ff]">Market Intelligence</span>
                            <span class="text-[9px] text-gray-500" id="scan-time">LAST: --:--</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <div class="bg-black/30 p-2 rounded border border-white/5 text-center">
                                <div class="text-[9px] text-gray-500">CONSENSUS</div>
                                <div id="scan-score" class="text-xl font-black text-white">--</div>
                            </div>
                            <div class="bg-black/30 p-2 rounded border border-white/5 text-center">
                                <div class="text-[9px] text-gray-500">WIN RATE</div>
                                <div id="scan-wr" class="text-xl font-black text-[#58a6ff]">--%</div>
                            </div>
                        </div>
                        <div class="bg-[#58a6ff]/10 border border-[#58a6ff]/30 p-2 rounded text-center mt-auto">
                            <div class="text-[9px] text-[#58a6ff] font-bold tracking-widest uppercase">AI SUGGESTION
                            </div>
                            <div id="scan-rec" class="text-sm font-black text-white mt-1">WAITING FOR SCAN...</div>
                        </div>
                    </div>

                    <div class="glass p-3 rounded-lg flex flex-col">
                        <span class="text-[10px] font-bold text-gray-500 uppercase mb-2">Event Log</span>
                        <div id="logs" class="flex-1 overflow-y-auto font-mono text-[9px] text-gray-400 space-y-1">
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script>
            // GLOBAL ERROR HANDLER
            window.onerror = function (msg, url, line, col, error) {
                const d = document.createElement('div');
                d.style.color = 'red';
                d.innerText = `JS ERROR: ${msg} (Line ${line})`;
                const logs = document.getElementById('logs');
                if (logs) logs.prepend(d);
                console.error("GLOBAL ERROR:", msg, error);
                return false;
            };
            console.log("SCRIPT BLOCK STARTING...");

            const API = window.location.protocol + '//' + window.location.host;
            const WS_URL = (window.location.protocol === 'https:' ? 'wss' : 'ws') + '://' + window.location.host + '/ws/stream';

            let cfg = { mode: 'PAPER', idx: 'NIFTY', lots: 1, lotSz: 50, strike: 19500, type: 'CE', day: 26, mth: 'OCT' };
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];

            // UTILS
            function log(m) {
                if (m.includes("GET /")) return;
                const d = document.createElement('div');
                d.innerText = `> ${m.substring(0, 50)}`;
                const logs = document.getElementById('logs');
                if (logs) logs.prepend(d);
                console.log(m);
            }

            // --- CORE FUNCTIONS ---
            async function start() {
                log("INITIALIZING AGENT...");
                try {
                    await fetch(`${API}/start`, { method: 'POST' });
                    await updateBackend();
                    await fetchHistory();
                    log("SYSTEM INITIALIZED");
                } catch (e) { log("START ERROR: " + e); }
            }

            async function stop() {
                await fetch(`${API}/stop`, { method: 'POST' });
                log("SYSTEM HALTED");
            }

            async function runDeepScan() {
                log("INITIATING PHASE 6 DEEP SCAN...");
                const el = document.getElementById('scan-rec');
                if (el) { el.innerText = "SCANNING..."; el.className = "text-sm font-black text-white mt-1 animate-pulse"; }

                try {
                    const r = await fetch(`${API}/analyze/deep`, { method: 'POST' });
                    log(`SCAN STATUS: ${r.status}`);
                    const text = await r.text();
                    const d = JSON.parse(text);

                    if (d.status === "Success") {
                        const macro = d.macro_scan;
                        const pred = d.prediction_engine;

                        document.getElementById('scan-time').innerText = new Date().toLocaleTimeString();
                        const score = macro.consensus_score;
                        const sScore = document.getElementById('scan-score');
                        sScore.innerText = (score > 0 ? "+" : "") + score;
                        sScore.style.color = score > 0 ? '#00ff9d' : (score < 0 ? '#ef4444' : 'white');

                        document.getElementById('scan-wr').innerText = pred.simulated_win_rate || "--%";

                        const rec = macro.recommendation;
                        const topCall = macro.calls && macro.calls.length > 0 ? `${macro.calls[0].strike} ${macro.calls[0].type}` : "";

                        el.className = "text-sm font-black text-white mt-1";
                        el.innerHTML = `<span class="${rec === 'BUY' ? 'text-[#00ff9d]' : 'text-[#ef4444]'}">${rec}</span> ${topCall}`;

                        log(`SCAN COMPLETE: ${rec} ${topCall}`);
                    } else {
                        log("SCAN FAILED: " + d.status);
                    }
                } catch (e) {
                    log("SCAN ERROR: " + e);
                }
            }

            async function manualExec(act) {
                const sym = `NSE_FO|${cfg.idx}${cfg.day}${cfg.mth}${cfg.strike}${cfg.type}`;
                log(`INJECTING ${act} ON ${sym}...`);
                await fetch(`${API}/execute?symbol=${sym}&action=${act}&quantity=${cfg.lots * cfg.lotSz}`, { method: 'POST' });
            }

            async function updateBackend() {
                const sym = `NSE_FO|${cfg.idx}`;
                try { await fetch(`${API}/config?mode=${cfg.mode}&symbol=${sym}&quantity=${cfg.lots * cfg.lotSz}&sl_pct=0.02&tp_pct=0.02`, { method: 'POST' }); } catch (e) { }
            }

            // --- CHARTS & WS ---
            let spot = null, opt = null;
            let cSpot = null, cOpt = null;

            document.addEventListener('DOMContentLoaded', () => {
                log("DOM LOADED");
                initCharts();
                initWS();
            });

            function initCharts() {
                if (typeof LightweightCharts === 'undefined') { log("CHARTS LIB MISSING"); return; }
                spot = createChart('chart-spot', '#00ff9d', '#ef4444');
                opt = createChart('chart-opt', '#58a6ff', '#f59e0b');
            }

            function createChart(id, cup, cdown) {
                const container = document.getElementById(id);
                if (!container) return null;
                const chart = LightweightCharts.createChart(container, {
                    layout: { background: { type: 'solid', color: '#090909' }, textColor: '#666' },
                    grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                    timeScale: { timeVisible: true, secondsVisible: true, borderColor: '#333' },
                    rightPriceScale: { borderColor: '#333' },
                    width: container.clientWidth,
                    height: container.clientHeight
                });
                try {
                    const series = chart.addCandlestickSeries({ upColor: cup, downColor: cdown, borderVisible: false, wickUpColor: cup, wickDownColor: cdown });
                    new ResizeObserver(entries => {
                        if (entries.length === 0 || entries[0].target !== container) return;
                        const newRect = entries[0].contentRect;
                        chart.applyOptions({ height: newRect.height, width: newRect.width });
                    }).observe(container);
                    return { chart, series };
                } catch (e) {
                    log("CHART ERR: " + e);
                    return null;
                }
            }

            function initWS() {
                log("CONNECTING WS: " + WS_URL);
                const ws = new WebSocket(WS_URL);
                ws.onopen = () => log("WS CONNECTED");
                ws.onclose = () => log("WS CLOSED");
                ws.onerror = (e) => log("WS ERROR");
                ws.onmessage = (e) => {
                    try {
                        const m = JSON.parse(e.data);
                        if (m.type === 'TICK') {
                            const ltp = m.data.ltp;
                            // Update Spot Chart (simulated local aggregation for smoothness)
                            if (spot) updCandle(spot, ltp);
                            if (opt) updCandle(opt, (ltp % 100) + Math.random());
                            document.getElementById('ltp-spot').innerText = ltp.toFixed(2);
                        } else if (m.type === 'CANDLE') {
                            // Server-side consolidated candle
                            const c = m.data;
                            const chartCandle = {
                                time: c.timestamp,
                                open: c.open,
                                high: c.high,
                                low: c.low,
                                close: c.close
                            };
                            if (spot) {
                                spot.series.update(chartCandle);
                                // Sync local ref to prevent overwriting by tick
                                cSpot = chartCandle;
                            }
                        } else if (m.type === 'LOG') {
                            log(m.data);
                        } else if (m.type === 'ORDER') {
                            log(`⚡ ORDER ${m.data.status} ${m.data.action}`);
                            updateBackend();
                        }
                    } catch (e) { }
                };
            }

            function updCandle(chartObj, p) {
                // Client-side tick aggregation for immediate feedback
                const t = Math.floor(Date.now() / 1000); const tf = t - (t % 60);
                let candleRef = chartObj === spot ? cSpot : cOpt;

                // If new minute or no ref
                if (!candleRef || candleRef.time !== tf) {
                    candleRef = { time: tf, open: p, high: p, low: p, close: p };
                    if (chartObj === spot) cSpot = candleRef; else cOpt = candleRef;
                } else {
                    candleRef.close = p;
                    candleRef.high = Math.max(candleRef.high, p);
                    candleRef.low = Math.min(candleRef.low, p);
                }
                chartObj.series.update(candleRef);
            }

            async function fetchHistory() {
                const sym = `NSE_FO|${cfg.idx}`;
                log(`FETCHING HISTORY: ${sym}`);
                try {
                    const r = await fetch(`${API}/history?symbol=${sym}`);
                    const d = await r.json();
                    if (Array.isArray(d) && spot) {
                        spot.series.setData(d);
                        // Update local ref to last candle to avoid gaps
                        if (d.length > 0) cSpot = d[d.length - 1];
                    }
                } catch (e) { log("HIST ERR: " + e); }
            }

            // --- UI HELPERS ---
            async function selIdx(i) {
                cfg.idx = i;
                log("SWITCHING TO: " + i);

                // Highlight Active Button
                document.querySelectorAll('.idx-btn').forEach(b => b.classList.remove('bg-gray-700', 'text-white'));
                document.getElementById(`btn-${i}`).classList.add('bg-gray-700', 'text-white'); // Assuming ids exist

                if (spot) spot.series.setData([]); // Clear chart

                await updateBackend();
                await fetchHistory();
            }
            function updLots(d) { cfg.lots = Math.max(1, cfg.lots + d); document.getElementById('lot-count').innerText = cfg.lots; }
            function setMode(m) {
                cfg.mode = m;
                updateBackend();

                // Toggle Tab Highlighting
                const tP = document.getElementById('tab-paper');
                const tL = document.getElementById('tab-live');

                if (m === 'PAPER') {
                    tP.className = tP.className.replace('tab-inactive', 'tab-active-paper').replace('opacity-50', '');
                    tL.className = tL.className.replace('tab-active-live', 'tab-inactive').replace('', 'opacity-50');
                } else {
                    tL.className = tL.className.replace('tab-inactive', 'tab-active-live').replace('opacity-50', '');
                    tP.className = tP.className.replace('tab-active-paper', 'tab-inactive').replace('', 'opacity-50');
                }
            }

            setInterval(async () => {
                try {
                    const r = await fetch(`${API}/metrics`);
                    const m = await r.json();

                    if (m.paper) {
                        document.getElementById('bal-paper').innerText = "₹" + m.paper.balance.toLocaleString('en-IN');
                        document.getElementById('pnl-paper').innerText = "₹" + (m.paper.realized_pnl + m.paper.unrealized_pnl).toFixed(2);
                    }

                    if (m.live) {
                        const liveBal = m.live.balance || 0;
                        document.getElementById('bal-live').innerText = "₹" + liveBal.toLocaleString('en-IN');
                        document.getElementById('pnl-live').innerText = "₹" + (m.live.realized_pnl + m.live.unrealized_pnl).toFixed(2);

                        // Status Indicator logic could go here
                    }
