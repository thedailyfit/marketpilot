<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPilot AI | Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #05050a;
            --bg-secondary: #0c0c14;
            --bg-card: #111119;
            --border-color: #1e1e2e;
            --text-primary: #ffffff;
            --text-secondary: #6b6b80;
            --text-muted: #3a3a4e;
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --success: #22c55e;
            --danger: #ef4444;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --gradient-glow: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(139,92,246,0.15) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(99,102,241,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 70%, rgba(139,92,246,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(168,85,247,0.04) 0%, transparent 40%);
            z-index: 0;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(99,102,241,0.4);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: var(--gradient-primary);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(99,102,241,0.3);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
            50% { box-shadow: 0 8px 48px rgba(99,102,241,0.5); }
        }

        .logo-text {
            font-size: 30px;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
            font-weight: 400;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            text-align: center;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 28px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15), 0 0 20px rgba(99,102,241,0.1);
        }

        .form-input::placeholder { color: var(--text-muted); }

        .form-input.code-input {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 8px;
            font-family: 'JetBrains Mono', 'Inter', monospace;
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }

        .btn:active { transform: translateY(0); }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 28px;
        }

        .feature-item {
            text-align: center;
            padding: 14px 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .feature-item:hover {
            background: rgba(99,102,241,0.05);
            border-color: rgba(99,102,241,0.15);
        }

        .feature-icon { font-size: 22px; margin-bottom: 6px; }
        .feature-text { font-size: 10px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }

        .security-note {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .security-note span { color: var(--text-secondary); }
    </style>
</head>

<body>
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <div class="logo-text">MarketPilot AI</div>
            <div class="logo-subtitle">Autonomous Trading Intelligence System</div>
        </div>

        <div class="card">
            <div class="card-title">🔐 System Access</div>
            <div class="card-desc">Enter your credentials to access the trading terminal</div>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="login-email" placeholder="your@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label">Access Code</label>
                    <input type="password" class="form-input code-input" id="login-code" placeholder="• • • • • • •" required maxlength="10" autocomplete="current-password">
                </div>

                <button type="submit" class="btn" id="login-btn">
                    Access Trading Terminal →
                </button>
            </form>
        </div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">🧠</div>
                <div class="feature-text">40+ AI Agents</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Live Charts</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Auto Trading</div>
            </div>
        </div>

        <div class="security-note">
            🔒 <span>Private system • Authorized access only</span>
        </div>
    </div>

    <script>
        // Generate floating particles
        const particlesEl = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
            particlesEl.appendChild(p);
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-message').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('login-email').value.trim();
            const code = document.getElementById('login-code').value.trim();
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Verifying...';

            // Client-side validation
            if (email !== 'theakhileshreddy07@gmail.com') {
                showError('Access denied. Unauthorized email.');
                btn.disabled = false;
                btn.textContent = 'Access Trading Terminal →';
                return;
            }

            if (code !== '1173244') {
                showError('Invalid access code. Try again.');
                btn.disabled = false;
                btn.textContent = 'Access Trading Terminal →';
                return;
            }

            // Set auth in localStorage
            localStorage.setItem('mp_auth', JSON.stringify({ email, ts: Date.now() }));

            showSuccess('✅ Access granted. Loading trading terminal...');

            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1200);
        }

        // Auto-redirect if already authenticated
        window.onload = () => {
            const auth = localStorage.getItem('mp_auth');
            if (auth) {
                try {
                    const data = JSON.parse(auth);
                    if (data.email === 'theakhileshreddy07@gmail.com') {
                        window.location.href = '/dashboard';
                    }
                } catch (e) { localStorage.removeItem('mp_auth'); }
            }
        };
    </script>
</body>
</html>
